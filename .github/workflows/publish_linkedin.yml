# GitHub Actions workflow: Publicar en LinkedIn automáticamente
# Guardar en: .github/workflows/publish_linkedin.yml (dentro del repo superhuman-hub)
#
# SECRETS necesarios en GitHub → Settings → Secrets and variables → Actions:
#   ANTHROPIC_API_KEY       → tu clave de console.anthropic.com
#   LINKEDIN_ACCESS_TOKEN   → token OAuth de LinkedIn Developer Portal
#   LINKEDIN_PERSON_URN     → urn:li:person:XXXXXXX (tu ID de LinkedIn)

name: Publicar en LinkedIn

on:
  schedule:
    # Lunes, Miércoles, Viernes a las 08:30 hora Madrid (UTC+2 en verano = 06:30 UTC)
    - cron: '30 6 * * 1,3,5'
  workflow_dispatch:  # permite lanzarlo manualmente desde GitHub Actions

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar script de publicación
        run: python publish.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}

      - name: Guardar estado de noticias publicadas
        # Solo hace commit si published_ids.json cambió
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add published_ids.json
          git diff --staged --quiet || git commit -m "chore: actualizar noticias publicadas [skip ci]"
          git push
