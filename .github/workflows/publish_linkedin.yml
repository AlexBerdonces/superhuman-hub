name: Publicar en LinkedIn

on:
  schedule:
    - cron: '30 6 * * 1,3,5'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Debug - listar archivos
        run: ls -la

      - name: Instalar dependencias
        run: pip install anthropic>=0.40.0 openai>=1.30.0 requests>=2.31.0 python-dotenv>=1.0.0

      - name: Ejecutar script de publicación
        run: python publish.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}

      - name: Guardar estado de noticias publicadas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add published_ids.json
          git diff --staged --quiet || git commit -m "chore: actualizar noticias publicadas [skip ci]"
          git push
