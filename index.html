<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsletter Hub</title>
<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #22223a;
  --accent: #6c63ff;
  --violet: #8b5cf6;
  --green: #00c896;
  --orange: #ff9f40;
  --red: #ff4757;
  --blue: #4fc3f7;
  --purple: #ce93d8;
  --teal: #80cbc4;
  --accent2: #ff6584;
  --text: #e8e8f0;
  --text2: #9090a8;
  --border: #2a2a3a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
}

/* HEADER */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 12px;
}
.header-top {
  display: flex;
  align-items: baseline;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.header-title {
  font-size: 1.6rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--violet));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-sub {
  font-size: 0.85rem;
  color: var(--text2);
}
.cat-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}
.cat-chip {
  font-size: 0.72rem;
  padding: 2px 8px;
  border-radius: 20px;
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border);
}

/* CONTROLS */
.controls {
  position: sticky;
  top: 0;
  z-index: 99;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.search-box {
  width: 100%;
  padding: 8px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}
.search-box:focus {
  border-color: var(--accent);
}
.search-box::placeholder { color: var(--text2); }

.btn-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
.btn-row label {
  font-size: 0.78rem;
  color: var(--text2);
  margin-right: 2px;
}
.filter-btn {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  font-size: 0.8rem;
  transition: all 0.15s;
}
.filter-btn:hover {
  border-color: var(--accent);
  color: var(--text);
}
.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 600;
}
.filter-btn.active-sort {
  background: var(--violet);
  border-color: var(--violet);
  color: #fff;
  font-weight: 600;
}

/* GRID */
.grid-container {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

/* CARDS */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  display: flex;
  flex-direction: column;
}
.card:hover {
  transform: translateY(-2px);
  border-color: var(--blue);
  box-shadow: 0 4px 20px rgba(79,195,247,0.15);
}
.card-top-border {
  height: 3px;
  width: 100%;
}
.card-body {
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
}
.card-badges {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
}
.badge {
  font-size: 0.7rem;
  padding: 3px 8px;
  border-radius: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.badge-cat {
  background: rgba(108,99,255,0.15);
  color: var(--accent);
  border: 1px solid rgba(108,99,255,0.3);
}
.badge-score-green { background: rgba(0,200,150,0.15); color: var(--green); border: 1px solid rgba(0,200,150,0.3); }
.badge-score-orange { background: rgba(255,159,64,0.15); color: var(--orange); border: 1px solid rgba(255,159,64,0.3); }
.badge-score-red { background: rgba(255,71,87,0.15); color: var(--red); border: 1px solid rgba(255,71,87,0.3); }
.badge-fuente {
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border);
  font-weight: 500;
}
.fuentes-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 10px;
  align-items: center;
  justify-content: flex-end;
}
.fuente-pill {
  display: flex;
  align-items: center;
  gap: 4px;
}
.badge-prompt {
  background: rgba(139,92,246,0.15);
  color: var(--violet);
  border: 1px solid rgba(139,92,246,0.3);
}
.badge-tool {
  font-size: 0.7rem;
  padding: 3px 8px;
  border-radius: 12px;
  font-weight: 600;
  color: #fff;
}

.card-title {
  font-size: 0.95rem;
  font-weight: 600;
  line-height: 1.35;
  color: var(--text);
}
.card-summary {
  font-size: 0.82rem;
  color: var(--text2);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.summary-row {
  display: flex;
  align-items: flex-start;
  gap: 6px;
}
.summary-row .card-summary {
  flex: 1;
}
.expand-btn {
  flex-shrink: 0;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  font-size: 11px;
  font-weight: 700;
  cursor: default;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
  transition: background 0.15s, color 0.15s;
}
.expand-btn:hover {
  background: var(--accent, #6c63ff);
  color: #fff;
  border-color: var(--accent, #6c63ff);
}
#news-tooltip {
  display: none;
  position: fixed;
  background: var(--surface, #1e1e2e);
  border: 1px solid var(--border, #333);
  border-radius: 8px;
  padding: 10px 13px;
  width: 300px;
  font-size: 0.82rem;
  line-height: 1.55;
  color: var(--text, #e0e0e0);
  box-shadow: 0 6px 24px rgba(0,0,0,0.45);
  z-index: 9999;
  white-space: normal;
  pointer-events: none;
}
.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.tag {
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border);
}
.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: auto;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  font-size: 0.75rem;
  color: var(--text2);
}
.card-footer a {
  color: var(--accent);
  text-decoration: none;
  font-size: 0.75rem;
}
.card-footer a:hover { text-decoration: underline; }

/* ACCORDION */
.accordion-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--violet);
  cursor: pointer;
  font-size: 0.8rem;
  padding: 6px 12px;
  width: 100%;
  text-align: left;
  transition: background 0.15s;
}
.accordion-btn:hover { background: rgba(139,92,246,0.1); }
.accordion-content {
  display: none;
  margin-top: 8px;
}
.accordion-content.open { display: block; }
.prompt-code {
  background: #0d0d1a;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  font-size: 0.78rem;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.5;
  font-family: 'Fira Mono', 'Consolas', monospace;
  position: relative;
}
.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text2);
  cursor: pointer;
  font-size: 0.72rem;
  padding: 3px 8px;
  transition: all 0.15s;
}
.copy-btn:hover { color: var(--text); border-color: var(--accent); }
.copy-btn.copied { color: var(--green); border-color: var(--green); }

.desglose-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  font-size: 0.78rem;
}
.desglose-table th {
  text-align: left;
  padding: 6px 8px;
  background: var(--surface2);
  color: var(--text2);
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  width: 38%;
}
.desglose-table td {
  padding: 6px 8px;
  color: var(--text);
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.4;
}
.desglose-table tr:last-child th,
.desglose-table tr:last-child td { border-bottom: none; }

/* EMPTY STATE */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
  font-size: 1rem;
}

/* MOBILE */
@media (max-width: 480px) {
  .grid-container { padding: 12px; gap: 12px; }
  .controls { padding: 8px 12px; }
  .header-title { font-size: 1.3rem; }
}
</style>
</head>
<body>

<header class="site-header" id="site-header">
  <div class="header-top">
    <span class="header-title">📰 Newsletter Hub</span>
    <span class="header-sub" id="header-sub"></span>
  </div>
  <div class="cat-chips" id="cat-chips"></div>
</header>

<div class="controls" id="controls">
  <input class="search-box" id="search-input" type="text" placeholder="🔍 Buscar en título, resumen, prompt, etiquetas..." oninput="applyFilters()">

  <div class="btn-row" id="type-row">
    <label>Tipo:</label>
    <button class="filter-btn active" onclick="setTypeFilter('all')">✨ Todo</button>
    <button class="filter-btn" onclick="setTypeFilter('noticia')">📰 Noticias</button>
    <button class="filter-btn" onclick="setTypeFilter('prompt')">💡 Prompts</button>
  </div>

  <div class="btn-row" id="sort-row">
    <label>Ordenar:</label>
    <span class="filter-label">Ordenar:</span>
    <button class="filter-btn active-sort" onclick="setSort('puntuacion')">🏆 Puntuación</button>
    <button class="filter-btn" onclick="setSort('fecha')">📅 Más reciente</button>
    <button class="filter-btn" id="sort-herramienta-btn" onclick="setSort('herramienta')" style="display:none">🤖 Herramienta (prompts)</button>
  </div>

  <div class="btn-row" id="cat-row">
    <label>Categoría:</label>
    <button class="filter-btn active" onclick="setCatFilter('all')">✨ Todas</button>
    <button class="filter-btn" onclick="setCatFilter('IA')">🤖 IA</button>
    <button class="filter-btn" onclick="setCatFilter('Robotica')">🦾 Robótica</button>
    <button class="filter-btn" onclick="setCatFilter('Espacio')">🚀 Espacio</button>
    <button class="filter-btn" onclick="setCatFilter('Salud')">🏥 Salud</button>
    <button class="filter-btn" onclick="setCatFilter('Negocios')">💼 Negocios</button>
    <button class="filter-btn" onclick="setCatFilter('Tecnologia')">💻 Tecnología</button>
    <button class="filter-btn" onclick="setCatFilter('Ciencia')">🔬 Ciencia</button>
    <button class="filter-btn" onclick="setCatFilter('Politica')">⚖️ Política</button>
    <button class="filter-btn" onclick="setCatFilter('Emprendimiento')">💡 Emprendimiento</button>
  </div>

  <div class="btn-row" id="score-row">
    <label>Impacto:</label>
    <button class="filter-btn active" onclick="setScoreFilter('all')">⭐ Todos</button>
    <button class="filter-btn" onclick="setScoreFilter('alto')">🟢 Alto</button>
    <button class="filter-btn" onclick="setScoreFilter('medio')">🟠 Medio</button>
    <button class="filter-btn" onclick="setScoreFilter('bajo')">🔴 Bajo</button>
  </div>

  <div class="btn-row" id="newsletter-row">
    <label>Newsletter:</label>
    <!-- populated dynamically by JS -->
  </div>
</div>

<div class="grid-container" id="grid"></div>

 ofertas de trabajo, crecimiento de newsletter, posicionamiento de autoridad, etc.). Pregunta mi público objetivo (sé específico). Pregunta mi oferta principal (qué quiero que la gente compre, reserve o se una). Pregunta hasta dos enlaces destacados (URL + descripción). Pregunta las pruebas sociales clave a destacar (tamaño de audiencia, ingresos, marcas, menciones en medios, etc.). Una vez que tengas esto, reescribe mi perfil completo de LinkedIn incluyendo titular, sección Acerca de, extracto y tres a cinco publicaciones o logros destacados en el historial de experiencia.", "desglose": {"rol": "Consultor experto en LinkedIn y posicionamiento profesional", "contexto": "Se sube el PDF del perfil de LinkedIn; se usa Gemini Pro con Canvas y Thinking habilitados", "instruccion": "Hacer preguntas de aclaración sobre objetivos y audiencia, luego reescribir el perfil completo de LinkedIn", "cadena_pensamiento": "Primero recopila información clave preguntando al usuario, luego reescribe basándose en las respuestas", "formato": "Reescritura completa del perfil: titular, About, extracto y logros destacados", "restricciones": "No reescribir hasta tener respuestas de aclaración; basarse en pruebas sociales reales del usuario"}}, {"id": "prompt_004", "tipo": "prompt", "titulo": "Crear diagramas interactivos de orientación vocacional", "herramienta": "Claude", "puntuacion": 78, "fecha": "2026-05-27", "fuente_asunto": "🚢 The AI cruise industry", "etiquetas": ["Educación", "Datos", "Creatividad"], "prompt_completo": "¿Cuál es una buena carrera universitaria para alguien a quien le gustan estas cosas: dibujar bocetos, visitar edificios antiguos y resolver puzzles 3D? Mapea carreras con esa vibra.", "desglose": {"rol": "No especificado", "contexto": "Se usa Claude Sonnet 4.6 para generar un diagrama interactivo", "instruccion": "Recomendar carreras universitarias basadas en intereses específicos y mapearlas visualmente en un diagrama", "cadena_pensamiento": "No especificado", "forma mpt_008", "tipo": "prompt", "titulo": "Generar ideas de posts virales de LinkedIn analizando perfil", "herramienta": "ChatGPT", "puntuacion": 88, "fecha": "2026-05-21", "fuente_asunto": "📈 Meet the autonomous growth agent", "etiquetas": ["Redes Sociales", "Marketing", "Carrera Profesional", "Escritura"], "prompt_completo": "Analiza mi perfil de LinkedIn, publicaciones y audiencia, luego genera 10 ideas de posts de LinkedIn sobre el uso de IA en el trabajo. Cada idea debe surgir de un momento real en el trabajo, vincular la IA con el apalancamiento o el impacto en la carrera, desafiar una suposición común y coincidir con mi tono claro y práctico. Evita el hype. Optimiza para respuestas, no para likes. Genera solo las 10 líneas de apertura o ángulos.", "desglose": {"rol": "Estratega de contenido experto en LinkedIn", "contexto": "Se usa Taplio con el perfil de LinkedIn conectado; se analiza el perfil, publicaciones anteriores y audiencia", "instruccion": "Generar 10 ideas de posts de LinkedIn sobre IA en el trabajo, optimizadas para engagement y tono personal", "cadena_pensamiento": "Analizar perfil → identificar patrones de tono → generar ideas que desafíen suposiciones", "formato": "Lista de 10 líneas de apertura o ángulos para posts", "restricciones": "Sin hype; optimizar para respuestas no likes; tono claro y práctico; basado en momentos reales del trabajo"}}, {"id": "prompt_009", "tipo": "prompt", "titulo": "Usar Claude Cowork para tareas no técnicas con archivos", "herramienta": "Claude", "puntuacion": 70, "fecha": "2026-05-20", "fuente_asunto": "🦾 Gemini becomes your personal agent", "etiquetas": ["Productividad", "Automatización", "Datos"], "prompt_completo": "Organiza automáticamente mis carpetas, crea hojas de cálculo a partir de capturas de pantalla, redacta informes a partir de notas dispersas y más. [Selecciona una carpeta específica y describe la tarea exacta que quieres que Claude realice con los archivos dentro de ella]", "desglose": {"rol": "Asistente al", "etiquetas": ["Automatización", "Productividad", "Código"], "prompt_completo": "Abre [app/sitio web/archivo], completa [tarea], luego resume los resultados y pregunta antes de hacer cambios importantes.", "desglose": {"rol": "Agente de automatización de escritorio", "contexto": "Se usa OpenAI Codex con Computer Use habilitado en modo Full access con permisos aprobados", "instruccion": "Ejecutar una tarea completa en apps, sitios web o archivos del escritorio, resumir resultados y pedir confirmación antes de cambios grandes", "cadena_pensamiento": "Abrir → completar tarea → resumir → confirmar antes de cambios mayores", "formato": "Resultado de la tarea completada + resumen de lo hecho + pregunta de confirmación si hay cambios importantes", "restricciones": "Pedir confirmación antes de cambios mayores; cuidado con datos sensibles"}}, {"id": "prompt_014", "tipo": "prompt", "titulo": "Analizar idea de negocio como VC con análisis de 10 slides", "herramienta": "Perplexity", "puntuacion": 95, "fecha": "2026-05-13", "fuente_asunto": "💻 Google's Macbook competitor", "etiquetas": ["Análisis", "Investigación", "Finanzas", "Presentaciones"], "prompt_completo": "Estoy evaluando esta idea de startup: [pega idea]. Actúa como un VC de primer nivel y operador de startups, y crea un análisis conciso de 10 slides estilo inversión que determine si esta idea vale la pena perseguir. Cubre la oportunidad de mercado (TAM/SAM/SOM), ICP y pain point, competidores y precios, tendencias del mercado, análisis DAFO, diferenciación del producto, costo de construcción de V1 y stack tecnológico, equipo fundador ideal, estrategia GTM para los primeros 100 clientes, mayores riesgos y una hoja de ruta de 30/60/90 días. Usa estilo de presentación visual moderno con gráficos, tablas e insights ejecutivos concisos en lugar de párrafos largos. Cuantifica suposiciones donde sea posible, incluye perspectivas contrarianistas.", "desglose": {"rol": "VC de primer nivel y operador de startups", "contexto": "Se usa Perplexity Deep Research para análisis con información de mercado actualizada en tiempo real", "instruccion": "Crear análisis completo de inversión de 10 slides con todos los componentes clave de due diligence de startup", "cadena_pensamiento": "Análisis estructurado: mercado → cliente → competencia → tendencias → DAFO → producto → costos → equipo → GTM → riesgos → roadmap", "formato": "Análisis tipo presentación de inversión con gráficos, tablas y 10 secciones bien definidas", "restricciones": "Estilo visual y ejecutivo, no párrafos largos; cuantificar suposiciones; incluir perspectivas contrarianistas"}}, {"id": "prompt_015", "tipo": "prompt", "titulo": "Crear imágenes estilo enciclopedia educativa con datos visuales", "herramienta": "ChatGPT", "puntuacion": 82, "fecha": "2026-05-11", "fuente_asunto": "🎧 Apple's AI AirPods near production", "etiquetas": ["Imagen", "Educación", "Diseño", "Creatividad"], "prompt_completo": "Crea una infografía vertical premium estilo 'enciclopedia' sobre [TEMA] que parezca una página de manual de historia natural coleccionable mezclada con diseño editorial infográfico moderno. El layout debe sentirse altamente estructurado, educativo y modular, no como un póster o anuncio. Incluye una imagen principal ultra-detallada del sujeto, múltiples callouts de detalles ampliados, paneles de información redondeados, secciones de taxonomía/perfil básico, datos de comportamiento/ecología, características físicas, datos rápidos, módulos de comparación, sistemas de calificación, iconos, gráficos y texto conciso estilo enciclopedia. Usa fondo claro, paleta de colores suave y elegante.", "desglose": {"rol": "No especificado", "contexto": "Se usa ChatGPT con la opción Crear Imagen", "instruccion": "Generar una infografía vertical detallada estilo enciclopedia sobre cualquier tema con múltiples elementos visuales y de datos", "cadena_pensamiento": "No especificado", "formato": "Imagen vertical estilo enciclopedia con múltiples secciones, ca o o descripción: [INTRODUCE TUS DETALLES]\n- Mercado objetivo: [INTRODUCE TUS DETALLES]\n- Etapa actual: [INTRODUCE TUS DETALLES]\n\n# Requisitos y Restricciones\n- **Tono:** Directo, implacable, pero constructivo—como un mentor duro que se preocupa por los resultados\n- **Profundidad:** Precisión quirúrgica para identificar debilidades, respaldada por dinámicas de mercado reales\n- **Formato:** Análisis estructurado que va desde los puntos ciegos hasta las soluciones\n- **Foco:** Priorizar las suposiciones más peligrosas y los fallos fatales primero\n- **Suposición:** Tratar esto como un pre-mortem—asumir el fracaso y trabajar hacia atrás\n\n# Formato de Salida\n\n## Los 3 Mayores Puntos Ciegos que No Puedes Ver\n1. [Punto ciego]: [Por qué esta suposición es peligrosa]\n2. [Punto ciego]: [Realidad de mercado que estás ignorando]\n3. [Punto ciego]: [Brecha de recursos/ejecución que estás subestimando]\n\n## Las 5 Formas Más Probables en que Esto Falla\n1. [Modo de fallo]: [Probabilidad y cronograma]\n2. [Modo de fallo]: [Por qué esto mata al 80% de los proyectos similares]\n3. [Modo de fallo]: [La realidad operativa que no has considerado]\n4. [Modo de fallo]: [Fuerzas del mercado que trabajan en tu contra]\n5. [Modo de fallo]: [El cambio competitivo/tecnológico que te vuelve irrelevante]\n\n## Lo que un Competidor Inteligente Explotaría Inmediatamente\n- [Vulnerabilidad]: [Cómo atacarían esta debilidad]\n- [Brecha de mercado]: [Cómo se posicionarían contra ti]\n- [Ventaja de recursos]: [Qué aprovecharían que tú no puedes]\n\n## LA ÚNICA Cosa que Realmente Haría que Esto Funcionara\n[El giro crítico, el enfoque o el cambio de ejecución que aborda los problemas centrales]", "desglose": {"rol": "Inversor veterano y emprendedor en serie con 20+ años de experiencia", "contexto": "El usuario tiene una idea de negocio que necesita un análisis implacable pre-mortem", "instruccion": "Identificar puntos ciegos, modos de fallo, vulnerabilidades competitivas y el único cambio  de generar cualquier output", "cadena_pensamiento": "Leer → identificar suposiciones → identificar restricciones → preguntar mínimo necesario → confirmar → producir", "formato": "Primero preguntas ordenadas por impacto, luego confirmación en una frase, luego output al estándar profesional", "restricciones": "Una pregunta por tema, sin preguntas compuestas, no adivinar, citar fuentes"}}, {"id": "news_102", "titulo": "Microsoft lanza 7 modelos, agente y chip cuántico en Build 2026", "resumen": "Microsoft presentó en Build 2026 siete nuevos modelos MAI propios, su primer agente 'Autopilot' Scout basado en OpenClaw, y Majorana 2, un chip cuántico con 1,000x mejora en fiabilidad diseñado con ayuda de IA. La empresa también mostró Project Solara, plataforma para dispositivos 'agent-first'. Con esta jugada, Microsoft deja de ser solo distribuidor de OpenAI para convertirse en actor central de la era de los agentes.", "categoria": "Inteligencia Artificial", "puntuacion": 86, "fecha": "2026-06-03", "fuente_asunto": "Microsoft paves its own AI way at Build", "url": "https://news.microsoft.com/build-2026-live-blog", "newsletter": "The Rundown AI", "tipo": "noticia"}, {"id": "news_103", "titulo": "Trump suaviza orden ejecutiva sobre IA a revisión voluntaria de 30 días", "resumen": "Donald Trump firmó una orden ejecutiva pidiendo a los laboratorios de IA que voluntariamente entreguen sus modelos frontera al gobierno para una revisión de seguridad de 30 días antes de su lanzamiento, reducida desde los 90 días originalmente previstos. La orden excluye licencias obligatorias y dirige al DOJ a perseguir hackeos asistidos por IA.", "categoria": "Política y Regulación", "puntuacion": 57, "fecha": "2026-06-03", "fuente_asunto": "Microsoft paves its own AI way at Build", "url": "https://www.whitehouse.gov/presidential-actions/2026/06/promoting-advanced-artificial-intelligence-innovation-and-security/", "newsletter": "The Rundown AI", "tipo": "noticia", "puntuacion_anterior": 58, "razon e Slides cuando esté listo\n\nConsejo pro: Duplica el proyecto y sube más fuentes de datos para que Claude las incorpore en la presentación.", "desglose": {"rol": "Analista de datos y estratega de presentaciones", "contexto": "Datos CSV crudos de plataformas como YouTube o Facebook Ads", "instruccion": "Crear un deck de estrategia con análisis, gráficos y recomendaciones concretas", "cadena_pensamiento": "Primero cargar datos, luego analizar patrones, extraer mejores prácticas, crear visualizaciones", "formato": "Presentación lista para exportar a PowerPoint o Google Slides", "restricciones": "Mantener presentable y profesional, relacionar archivos multimedia con datos CSV"}}, {"id": "news_105", "titulo": "Nvidia reorganiza toda su línea de productos para agentes de IA", "resumen": "En COMPUTEX 2026, Nvidia presentó RTX Spark (chips para agentes IA en PCs con Microsoft), Vera (el 'CPU para agentes' usado por Anthropic, OpenAI y la NYSE), Cosmos 3 (modelo de robótica open source) y Nemotron 3 Ultra (550B parámetros, líder en open-source de EE.UU.). Jensen Huang declaró que 'la IA agente ha llegado' y reorganizó todo el ecosistema Nvidia alrededor de los agentes como principales consumidores de cómputo.", "categoria": "Inteligencia Artificial", "puntuacion": 99, "fecha": "2026-06-02", "fuente_asunto": "Nvidia rewires its entire lineup for AI agents", "url": "https://blogs.nvidia.com/recent-news/", "newsletter": "The Rundown AI", "tipo": "noticia", "puntuacion_anterior": 76, "razon_cambio": "La reorganización de producto de Nvidia para agentes IA se está adoptando como nuevo estándar; confirma el giro estructural del sector"}, {"id": "news_106", "titulo": "Bernie Sanders propone fondo soberano de IA para beneficiar a ciudadanos", "resumen": "El senador Bernie Sanders presentó el 'American A.I. Sovereign Wealth Fund Act', una propuesta legislativa que canalizaría el 50% de las acciones de las mayores empresas de IA a un fondo público, repartiendo las ganancias entre los r", "formato": "Lista de skills mejoradas y nuevas con instrucciones de implementación", "restricciones": "Basarse solo en sesiones reales del usuario"}}, {"id": "news_107", "titulo": "El Papa León XIV publica encíclica de 42,000 palabras sobre la IA", "resumen": "El Papa León XIV publicó 'Magnifica Humanitas', su primera encíclica dirigida a los 1,400 millones de católicos, advirtiendo que la IA está controlada por pocas empresas transnacionales que superan la capacidad regulatoria de los gobiernos y llamando a 'desarmar' la tecnología antes de que domine a la humanidad. Exigió marcos legales sólidos y dijo que las decisiones letales nunca deben delegarse a la IA.", "categoria": "Política y Regulación", "puntuacion": 29, "fecha": "2026-05-26", "fuente_asunto": "The Pope wants AI 'disarmed'", "url": "https://www.vatican.va/content/leo-xiv/en/encyclicals/documents/20260515-magnifica-humanitas.html", "newsletter": "The Rundown AI", "tipo": "noticia", "puntuacion_anterior": 60, "razon_cambio": "Orden ejecutiva de Trump voluntaria y ligera; la posición del Vaticano queda más aislada"}, {"id": "news_108", "titulo": "Modelos open-source de Meta y Google son 'descensurados' en minutos con herramientas públicas", "resumen": "El Financial Times reveló que herramientas disponibles públicamente en GitHub permiten eliminar las restricciones de seguridad de modelos open-source en minutos. Llama 3.3 fue modificado en 10 minutos con cuatro líneas de código, con el modelo resultante respondiendo preguntas sobre armas. La herramienta Heretic ha producido más de 3,500 modelos 'descensurados' descargados 13 millones de veces.", "categoria": "Inteligencia Artificial", "puntuacion": 86, "fecha": "2026-05-26", "fuente_asunto": "The Pope wants AI 'disarmed'", "url": "https://www.ft.com/content/5630ed79-a263-41ed-9a1a-321617ae310e", "newsletter": "The Rundown AI", "tipo": "noticia", "puntuacion_anterior": 65, "razon_cambio": "Orden ejecutiva de Trump hace voluntaria la revisión; la facilid s y generar herramientas CLI compatibles con agentes para APIs difíciles de usar como Google Flights o ESPN.\n\nPasos:\n1. Ve a printingpress.dev y revisa los ejemplos o lee las notas de instalación en GitHub. Instala el starter kit: npx -y @mvanhorn/printing-press install starter-pack\n\n2. Dile a tu agente (Codex/Claude Code/Hermes): 'Inspecciona el starter kit. Lista las herramientas, lee su output de ayuda y prueba un comando seguro de solo lectura de ESPN o flight-goat. Dime qué herramienta funcionó y qué comando ejecutaste'\n\n3. Pídele al agente que instale el binario de Printing Press: go install github.com/mvanhorn/cli-printing-press/v4/cmd/printing-press@latest\n\n4. Ahora el agente puede construir sus propias herramientas CLI. Comienza con un sitio que tenga muchos datos públicos: 'Usa Printing Press para generar comandos de solo lectura para [SITIO WEB]. Propón primero los comandos útiles, luego generarlos y pruébalos'\n\nConsejo pro: Si tu agente tiene problemas con un MCP o integración específica, puedes pedirle que construya sus propios comandos con Printing Press. Solo necesitas una API key.", "desglose": {"rol": "Desarrollador de herramientas para agentes de IA", "contexto": "APIs públicas o sitios web con datos accesibles", "instruccion": "Crear herramientas CLI que los agentes puedan usar para acceder a datos externos", "cadena_pensamiento": "Instalar Printing Press → explorar API objetivo → proponer comandos → generar y probar → documentar", "formato": "Comandos CLI ejecutables y documentados listos para agentes", "restricciones": "Solo comandos de solo lectura inicialmente, verificar que no violen términos de servicio"}}, {"id": "news_114", "titulo": "IA de OpenAI refuta una creencia matemática de 80 años sobre geometría discreta", "resumen": "Un modelo de razonamiento general de OpenAI refutó autónomamente una creencia relacionada con el famoso problema de la distancia unitaria de Erdős de 1946, usando teoría algebraica de números en lugar de l isa (canales/búsquedas), encuentra videos de los últimos (horas/días), lee la transcripción y devuelve un brief con título, enlace, 3-5 puntos clave, por qué importa, ideas de seguimiento, puntuación de utilidad y un resumen de lo que cambió. Rastrea temas y videos en un Google Sheet'\n\n3. Empieza pequeño: un nicho, algunos canales de confianza, una o dos búsquedas y una ventana de 24-48 horas. Cuanto más específica sea la cobertura del scout, mejor el brief\n\n4. Ejecuta el agente y revisa el Sheet que crea. Asegúrate de que cada resultado tenga un enlace de fuente, puntos concretos y una puntuación de utilidad\n\nConsejo pro: Calibra la puntuación de señal desde el principio. Si el agente llama a un video mediocre un 8, dile por qué debería ser un 5. También puedes añadir una columna de Puntuación de Señal de Usuario para futuras ejecuciones.", "desglose": {"rol": "Investigador automatizado de contenido en YouTube", "contexto": "Lista de canales de YouTube o temas de búsqueda relevantes para el usuario", "instruccion": "Monitorear canales, analizar transcripciones y generar briefs de investigación priorizados", "cadena_pensamiento": "Buscar videos recientes → leer transcripciones → extraer insights → rankear → generar brief → guardar en Sheet", "formato": "Google Sheet con registro de videos + brief en texto con puntuación de utilidad", "restricciones": "Limitar la ventana temporal a 24-48 horas para mantener relevancia, empezar con pocos canales"}}, {"id": "news_124", "titulo": "OpenAI lanza GPT-Realtime-2 con razonamiento GPT-5 para agentes de voz en tiempo real", "resumen": "OpenAI presentó GPT-Realtime-2, GPT-Realtime-Translate y GPT-Realtime-Whisper, tres modelos de voz API que llevan razonamiento de nivel GPT-5 a la voz en vivo, con capacidad para usar múltiples herramientas simultáneamente, hablar mientras piensa y mejor control de tono. En Big Bench Audio, Realtime-2 alcanzó 96.6% frente al 81.4% de su predecesor. Zillow, Priceline y Deutsche Telekom ya e ", "url": "https://www.anthropic.com/research/anthropic-institute-agenda", "newsletter": "The Rundown AI", "tipo": "noticia"}, {"id": "prompt_032", "titulo": "Compara múltiples modelos de IA con el mismo prompt usando OpenRouter Fusion", "herramienta": "OpenRouter Fusion", "puntuacion": 65, "fecha": "2026-05-08", "fuente_asunto": "OpenAI closes reasoning gap in voice agents", "newsletter": "The Rundown AI", "tipo": "prompt", "etiquetas": ["comparación de modelos", "productividad", "evaluación", "OpenRouter"], "prompt_completo": "Guía para usar OpenRouter Fusion para probar el mismo prompt en múltiples modelos de IA a la vez y comparar los resultados lado a lado.\n\nPasos:\n1. Crea una cuenta en OpenRouter, abre OpenRouter Fusion (openrouter.ai/labs/fusion) y elige cómo quieres pagar el uso de IA: créditos de OpenRouter o claves de API que ya tienes\n\n2. En Fusion, selecciona los modelos que quieres comparar (por ejemplo, Opus 4.7 vs. GPT 5.4 vs. Grok) y ejecuta un prompt de benchmark a la vez, manteniéndolo idéntico\n\n3. Ejemplo de prompt para comparar: 'Eres asesor de una empresa SaaS de 20 personas que decide si reemplazar su reunión semanal de estado con una actualización escrita asíncrona. Escribe un memo de recomendación con 3 beneficios, 3 riesgos y un plan de implementación de 2 semanas. Hazlo conciso y práctico'\n\n4. Abre las respuestas, lee el análisis lado a lado y anota qué modelo es más sólido. En la demostración, unas 10 comparaciones costaron alrededor de 40 centavos\n\nConsejo pro: Ejecuta algunos prompts que uses todo el tiempo, anota qué modelo gana cada tarea y usa el navegador de modelos de OpenRouter para comparar precio y velocidad antes de gastar más.", "desglose": {"rol": "Evaluador de modelos de IA y optimizador de flujos de trabajo", "contexto": "Cuenta de OpenRouter con acceso a múltiples modelos de IA", "instruccion": "Ejecutar el mismo prompt en varios modelos simultáneamente y comparar calidad de respuestas", "cadena_pensamiento": "Se  ["Aprendizaje", "Educación", "Productividad"], "prompt_completo": "Actúa como tutor experto que me ayuda a dominar cualquier tema a través de un curso interactivo estilo entrevista. El proceso debe ser recursivo y personalizado.\n\n1. Pregúntame el tema que quiero aprender.\n2. Divide ese tema en un temario estructurado de lecciones progresivas, empezando por los fundamentos hasta conceptos avanzados.\n3. Para cada lección:\n   - Explica el concepto con claridad usando analogías y ejemplos del mundo real.\n   - Hazme preguntas socráticas para evaluar y profundizar mi comprensión.\n   - Dame un ejercicio corto o experimento mental para aplicar lo aprendido.\n   - Pregúntame si estoy listo para continuar o necesito aclaración.\n   - Si digo sí, pasa al siguiente concepto. Si digo no, reformula la explicación, da ejemplos adicionales y guíame con pistas hasta que entienda.\n4. Tras cada sección principal, proporciona un mini-quiz de repaso o resumen estructurado.\n5. Una vez cubierto todo el tema, ponme a prueba con un desafío integrador final que combine múltiples conceptos.\n6. Anímame a reflexionar sobre lo aprendido y sugiere cómo podría aplicarlo a un proyecto real.", "desglose": {"rol": "Tutor experto interactivo estilo entrevista socrática", "contexto": "El usuario quiere aprender cualquier tema de forma personalizada y progresiva", "instruccion": "Crear syllabus, enseñar por lecciones con preguntas socráticas, ejercicios, mini-quizzes y desafío final", "cadena_pensamiento": "Detectar nivel → construir temario → enseñar → evaluar comprensión → adaptar → avanzar", "formato": "Conversación interactiva por lecciones con evaluación continua", "restricciones": "No avanzar hasta confirmar comprensión; reformular si el usuario no entiende"}, "puntuacion_anterior": null, "razon_cambio": "Nuevo item"}, {"id": "prompt_041", "tipo": "prompt", "titulo": "Co-fundador técnico de IA: de idea a producto lanzado paso a paso", "herramienta": "ChatGPT", "puntuacion": 90, "fecha": "2026-06-10", "fuente_asunto": "🔓 Anthropic releases Claude Fable", "newsletter": "SuperHuman", "etiquetas": ["Emprendimiento", "Desarrollo de Producto", "Vibe Coding"], "prompt_completo": "Actúa como mi Co-Fundador Técnico.\n\nMi idea: [Describe tu idea de producto]\nObjetivo: [Explorar / Uso Personal / Compartir / Lanzamiento Público]\n\nTu trabajo es ayudarme a construir un producto real desde la idea hasta el lanzamiento manteniéndome al mando.\n\nProceso:\n1. Descubrimiento: Haz preguntas para entender el problema real. Cuestiona supuestos débiles. Separa imprescindibles de deseables. Sugiere la versión mínima viable.\n2. Planificación: Define la Versión 1. Explica el enfoque técnico en lenguaje simple. Valora la complejidad (Simple / Medio / Ambicioso). Lista herramientas, cuentas y decisiones necesarias.\n3. Construcción: Construye paso a paso. Explica qué haces y por qué. Prueba antes de avanzar. Para en decisiones clave y presenta opciones.\n4. Pulido: Prepara para producción. Gestiona errores y casos extremos. Asegura velocidad, usabilidad y diseño profesional.\n5. Lanzamiento y Entrega: Ayuda a desplegar si es necesario. Provee documentación e instrucciones de mantenimiento. Explica cómo mejorar la Versión 2.\n\nReglas: Trátame como dueño del producto. Explicaciones simples y prácticas. Sé honesto sobre limitaciones. Muévete rápido pero mantenme informado. Construye productos reales, no maquetas.", "desglose": {"rol": "Co-fundador técnico y responsable del proceso de desarrollo", "contexto": "Usuario con una idea de producto que quiere llevarlo a producción", "instruccion": "Guiar por 5 fases: Descubrimiento, Planificación, Construcción, Pulido y Lanzamiento", "cadena_pensamiento": "Validar idea → planificar MVP → construir iterando → pulir → lanzar", "formato": "Proceso estructurado en 5 fases con construcción paso a paso", "restricciones": "No overengineer; ser honesto sobre limitaciones; construir real, no mockups"}, "puntuacion_anterior": null, "razon_cambio": "Nuevo item"}, {"id": "prompt_042", "tipo": "prompt", "titulo": "Revisión de rendimiento de fin de día: coach de productividad implacable", "herramienta": "ChatGPT", "puntuacion": 85, "fecha": "2026-06-09", "fuente_asunto": "📱 Tim Cook's last keynote", "newsletter": "SuperHuman", "etiquetas": ["Productividad", "Reflexión", "Coaching"], "prompt_completo": "Actúa como mi coach de rendimiento personal, analista de productividad y compañero de responsabilidad. Al final de cada día te daré un resumen de lo que hice (tareas completadas, reuniones, decisiones, desafíos y observaciones). Tu trabajo es analizar mi día objetivamente y proporcionar una revisión reflexiva:\n- Identifica mis mayores victorias y dónde generé más valor.\n- Evalúa el uso de tiempo, energía y atención; señala brechas de productividad, distracciones y oportunidades perdidas.\n- Extrae las lecciones más importantes y patrones, incluyendo hábitos o decisiones a repetir o evitar.\n- Cuestiona mi pensamiento donde sea necesario, señala puntos ciegos y sugiere mejores enfoques o flujos de trabajo.\n- Recomienda las 3-5 acciones de mayor impacto para mañana, ordenadas por impacto y no por urgencia.\n- Termina con una puntuación del 1-10 para: Productividad, Enfoque, Ejecución, Pensamiento Estratégico y Efectividad General, con breve explicación.\nSé honesto, directo y constructivo. Tu objetivo no es validar mis acciones, sino ayudarme a ser más productivo, disciplinado y efectivo.\n\nResumen del día:\n[pegar actividades diarias]", "desglose": {"rol": "Coach de rendimiento, analista de productividad y compañero de responsabilidad", "contexto": "Revisión diaria de actividades para mejora continua de rendimiento", "instruccion": "Analizar victorias, brechas, lecciones, recomendar 3-5 acciones y puntuar 5 dimensiones", "cadena_pensamiento": "Revisar actividades → identificar patrones → extraer lecciones → priorizar mañana", "formato": "Análisis estructurado con puntuaciones 1-10 en 5 dimensiones", " umnas y condiciones relevantes, y genera la fórmula o el análisis correspondiente", "formato": "Fórmulas de Excel o análisis de datos en lenguaje natural, listos para aplicar en la hoja de cálculo", "restricciones": "Requiere instalar el complemento ChatGPT desde la pestaña Insertar > Complementos en Excel"}}, {"id": "prompt_085", "tipo": "prompt", "titulo": "Delegar tareas de equipo a Claude dentro de Slack", "herramienta": "Claude", "puntuacion": 65, "fecha": "2026-07-03", "fuente_asunto": "🏛️ Altman's global safety pitch has a 5% twist", "newsletter": "The Rundown AI", "etiquetas": ["Productividad", "Automatización", "Trabajo en equipo"], "prompt_completo": "1. Consigue Claude Team/Enterprise y permisos de administrador de Slack. En Slack, ve a Admin > Apps y Workflows, busca 'Claude' e instálalo.\n2. Busca Claude en Apps, ábrelo, entra en 'Home' y conecta tu cuenta. Luego abre la configuración de Claude Tag en la web y conecta las herramientas que debe usar.\n3. Ejecuta '@Claude connect' en Slack, copia el código de emparejamiento en la configuración web de Claude Tag, elige el alcance del canal, añade créditos de uso y actívalo.\n4. Abre 'Advanced' en la configuración de Claude Tag y cambia del modelo por defecto (más caro) a Sonnet. Luego prueba con un prompt de ejemplo en un hilo dedicado de Slack.\nConsejo: tras la primera ejecución, revisa el panel de administrador para ver el gasto en tokens, los plugins usados y los archivos de memoria creados. Puedes editar o borrar la memoria persistente de Claude Tag desde ahí.", "desglose": {"rol": "Compañero de equipo de IA dentro de Slack", "contexto": "Tu equipo quiere delegar tareas a Claude directamente desde los canales de Slack sin salir de la app", "instruccion": "Instalar y configurar Claude Tag en Slack para poder mencionar a @Claude y que ejecute tareas en la nube", "cadena_pensamiento": "Claude Tag conecta la cuenta de Claude con el workspace de Slack, define qué herramientas puede usar y ejecuta las tareas en segundo plano, notificando cuando termina", "formato": "Respuestas y tareas completadas directamente en el hilo de Slack donde se mencionó a @Claude", "restricciones": "Requiere plan Claude Team o Enterprise y permisos de administrador en Slack"}}, {"id": "prompt_086", "tipo": "prompt", "titulo": "Usar Design.md de Google con Claude Code para diseñar webs", "herramienta": "Claude", "puntuacion": 62, "fecha": "2026-07-02", "fuente_asunto": "🎉 Anthropic's Fable 5 returns worldwide", "newsletter": "The Rundown AI", "etiquetas": ["Diseño", "Desarrollo web", "Automatización"], "prompt_completo": "1. Crea una carpeta de proyecto, abre una Terminal dentro de ella, pega 'npx plugins add google-labs-code/stitch-skills --scope project --target claude-code' y pulsa Intro.\n2. Cuando te pregunte qué instalar, deja todo seleccionado y pulsa Intro. Luego, en Claude, ve a la pestaña Code e inicia un hilo de Claude Code en esa carpeta.\n3. Describe una idea sencilla de sitio web y pide a Claude que genere un archivo DESIGN.md usando las skills de Google Stitch.\n4. Pide a Claude Code: 'Crea un prototipo de sitio web de una sola página basado en este archivo DESIGN.md'.\nConsejo: usa las mismas skills de Stitch para extraer un Design.md de tu propia web existente. Luego entrega ese archivo a Claude cada vez que necesites una nueva página de producto, landing page o prototipo que mantenga tu identidad de marca sin empezar de cero.", "desglose": {"rol": "Diseñador de marca y prototipador web asistido por IA", "contexto": "Quieres crear sitios web coherentes con tu marca sin que 'se noten' hechos por IA", "instruccion": "Instalar las skills de Google Stitch en Claude Code y generar un archivo DESIGN.md que sirva de guía de marca para crear prototipos web", "cadena_pensamiento": "Claude Code usa las skills de Stitch para estructurar un briefing de diseño (DESIGN.md) con colores, tono y componentes, y luego genera un prototipo de página coherente con esa guía", "formato": "Archivo D function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatDate(d) {
  if (!d) return '';
  const parts = d.split('-');
  if (parts.length === 3) {
    return parts[2] + '/' + parts[1] + '/' + parts[0];
  }
  return d;
}

function getCatKey(item) {
  const c = item.categoria || '';
  return CAT_MAP[c] || 'IA';
}

function getScoreBadgeClass(score) {
  if (score > 70) return 'badge-score-green';
  if (score >= 40) return 'badge-score-orange';
  return 'badge-score-red';
}

function toggleAccordion(btn) {
  const content = btn.nextElementSibling;
  const isOpen = content.classList.contains('open');
  content.classList.toggle('open', !isOpen);
  btn.textContent = isOpen ? '▶ Ver desglose del prompt ▼' : '▼ Ocultar desglose ▲';
}

function copyPromptById(btn) {
  const id = btn.getAttribute('data-prompt-id');
  const item = RAW_DATA.noticias.find(x => x.id === id);
  const text = item ? (item.prompt_completo || '') : '';
  copyPrompt(btn, text);
}

function copyPrompt(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 Copiar';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 Copiar';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function buildCard(item) {
  const catKey = getCatKey(item);
  const borderColor = CAT_BORDER[catKey] || '#6c63ff';

    const nl = escapeHtml(f.newsletter || 'SuperHuman');
    const link = f.url ? `<a href="${escapeHtml(f.url)}" target="_blank" rel="noopener">→ Ver artículo</a>` : '';
    return `<span class="fuente-pill"><span class="badge badge-fuente">📨 ${nl}</span>${link}</span>`;
  }).join('');

  return `<div class="card">
    <div class="card-top-border" style="background:${borderColor}"></div>

      <div class="card-title">${escapeHtml(item.titulo)}</div>
      <div class="summary-row">
        <div class="card-summary">${escapeHtml(item.resumen)}</div>
        <div class="expand-btn" data-resumen="${escapeHtml(item.resumen)}">+</div>
      </div>
      <div class="card-footer">
        <span>📅 ${formatDate(item.fecha)}</span>
        <div class="fuentes-row">${fuentesHtml}</div>
      </div>
    </div>
  </div>`;
}

function buildPromptCard(item) {
  const tool = item.herramienta || 'Otro';
  const toolColor = TOOL_COLORS[tool] || '#6c63ff';
  const scoreClass = getScoreBadgeClass(item.puntuacion || 0);
  const tags = item.etiquetas || [];
  const promptText = item.prompt_completo || '';
  const d = item.desglose || {};
  const newsletter = item.newsletter || 'SuperHuman';
  
  const desgloseRows = [
    ['🎭 Rol', d.rol],
    ['🌍 Contexto', d.contexto],
    ['📋 Instrucción', d.instruccion],
    ['🧠 Cadena de pensamiento', d.cadena_pensamiento],
    ['📐 Formato', d.formato],
    ['🚫 Restricciones', d.restricciones],
  ].filter(r => r[1] && r[1] !== 'No especificado' && r[1] !== 'N/A').map(r =>
    `<tr><th>${escapeHtml(r[0])}</th><td>${escapeHtml(r[1])}</td></tr>`
  ).join('');

  const promptId = 'prompt_' + (item.id || Math.random().toString(36).slice(2));

  return `<div class="card">
    <div class="card-top-border" style="background:var(--violet)"></div>
    <div class="card-body">
      <div class="card-badges">
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          <span class="badge badge-prompt">💡 PROMPT</span>
          <span class="badge badge-tool" style="background:${toolColor}">${escapeHtml(tool)}</span>
        </div>
        <span class="badge ${scoreClass}">⭐ ${item.puntuacion || 0}</span>
      </div>
      <div class="card-title">${escapeHtml(item.titulo)}</div>
      ${tags.length ? `<div class="card-tags">${tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
      <div class="card-footer">
        <span>📅 ${formatDate(item.fecha)}</span>
        <span>📨 ${escapeHtml(newsletter)}</span>
      </div>
      <button class="accordion-btn" onclick="toggleAccordion(this)">▶ Ver desglose del prompt ▼</button>
      <div class="accordion-content">
        <div class="prompt-code" id="${promptId}-code">
          <button class="copy-btn" data-prompt-id="${escapeHtml(item.id)}" onclick="copyPromptById(this)">📋 Copiar</button>
          ${escapeHtml(promptText)}
        </div>
        ${desgloseRows ? `<table class="desglose-table"><tbody>${desgloseRows}</tbody></table>` : ''}
      </div>
    </div>
  </div>`;
}

function setTypeFilter(type) {
  activeType = type;
  document.querySelectorAll('#type-row .filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  
  const sortRow = document.getElementById('sort-row');
  const catRow = document.getElementById('cat-row');
  const scoreRow = document.getElementById('score-row');
  
  const sortHerramienta = document.getElementById('sort-herramienta-btn');
  if (type === 'prompt') {
    catRow.style.display = 'none';
    scoreRow.style.display = 'none';
    sortHerramienta.style.display = '';
    // Reset category filter so prompts are visible
    activeCat = 'all';
    document.querySelectorAll('#cat-row .filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('#cat-row .filter-btn').classList.add('active');
  } else {
    catRow.style.display = 'flex';
    scoreRow.style.display = 'flex';
    sortHerramienta.style.display = 'none';
  }
  applyFilters();
}

function setCatFilter(cat) {
  activeCat = cat;
  document.querySelectorAll('#cat-row .filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  applyFilters();
}

function setScoreFilter(score) {
  activeScore = score;
  document.querySelectorAll('#score-row .filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  applyFilters();
}

function setSort(sort) {
  activeSort = sort;
  document.querySelectorAll('#sort-row .filter-btn').forEach(b => b.classList.remove('active-sort'));
  event.target.classList.add('active-sort');
  applyFilters();
}

function setNewsletterFilter(nl) {
  activeNewsletter = nl;
  document.querySelectorAll('#newsletter-row .filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const query = document.getElementById('search-input').value.toLowerCase().trim();
  
  let items = noticias.filter(item => {
    // Type filter
    const itemType = item.tipo || 'noticia';
    if (activeType !== 'all' && itemType !== activeType) return false;
    
    // Category filter: if a category is active, exclude prompts (they have no category)
    if (activeCat !== 'all') {
      if (itemType !== 'noticia') return false;
      const catKey = getCatKey(item);
      if (catKey !== activeCat) return false;
    }
    
    // Newsletter filter
    if (activeNewsletter !== 'all') {
      const itemNewsletter = item.newsletter || 'SuperHuman';
      if (itemNewsletter !== activeNewsletter) return false;
    }

    // Score filter (only for noticias)
    if (activeScore !== 'all' && itemType === 'noticia') {
      const s = item.puntuacion || 0;
      if (activeScore === 'alto' && s <= 70) return false;
      if (activeScore === 'medio' && (s < 40 || s > 70)) return false;
      if (activeScore === 'bajo' && s >= 40) return false;
    }
    
    // Search filter
    if (query) {
      const searchable = [
        item.titulo || '',
        item.resumen || '',
        item.prompt_completo || '',
        (item.etiquetas || []).join(' '),
        item.categoria || '',
      ].join(' ').toLowerCase();
      if (!searchable.includes(query)) return false;
    }
    
    return true;
  });
  
  // Sort
  items.sort((a, b) => {
    if (activeSort === 'puntuacion') return (b.puntuacion || 0) - (a.puntuacion || 0);
    if (activeSort === 'fecha') return (b.fecha || '').localeCompare(a.fecha || '');
    if (activeSort === 'herramienta') return (a.herramienta || '').localeCompare(b.herramienta || '');
    return (b.puntuacion || 0) - (a.puntuacion || 0);
  });
  
  const grid = document.getElementById('grid');
  if (items.length === 0) {
    grid.innerHTML = '<div class="empty-state">😕 No se encontraron resultados para tu búsqueda</div>';
    return;
  }
  
  grid.innerHTML = items.map(item => {
    const tipo = item.tipo || 'noticia';
    return tipo === 'prompt' ? buildPromptCard(item) : buildCard(item);
  }).join('');
}

(function initPage() {
  // --- Header stats (dynamic) ---
  const noticiaCount = noticias.filter(n => (n.tipo || 'noticia') === 'noticia').length;
  const promptCount = noticias.filter(n => n.tipo === 'prompt').length;
  const lastUpdate = RAW_DATA.ultima_actualizacion || '';
  document.getElementById('header-sub').textContent =
    `${noticiaCount} noticias · ${promptCount} prompts · última actualización: ${lastUpdate}`;

  // --- Category chips ---
  const cats = {};
  noticias.forEach(n => {
    if ((n.tipo || 'noticia') === 'noticia') {
      const k = getCatKey(n);
      cats[k] = (cats[k] || 0) + 1;
    }
  });
  const chipsEl = document.getElementById('cat-chips');
  const entries = Object.entries(cats).sort((a,b) => b[1]-a[1]);
  chipsEl.innerHTML = entries.map(([k,v]) => {
    const label = CAT_LABEL[k] || k;
    return `<span class="cat-chip" style="border-color:${CAT_BORDER[k]||'#6c63ff'};color:${CAT_BORDER[k]||'#6c63ff'}; background:rgba(0,0,0,0.2)">${label} ${v}</span>`;
  }).join('');
  chipsEl.innerHTML += `<span class="cat-chip" style="border-color:var(--violet);color:var(--violet);background:rgba(0,0,0,0.2)">💡 Prompts ${promptCount}</span>`;

  // --- Newsletter filter (auto-generated) ---
  const newsletters = [...new Set(noticias.map(n => n.newsletter || 'SuperHuman'))].sort();
  const nlRow = document.getElementById('newsletter-row');
  const nlBtns = [`<button class="filter-btn active" onclick="setNewsletterFilter('all')">✨ Todas</button>`];
  const NL_ICONS = { 'SuperHuman': '🦸', 'The Rundown AI': '📋', 'The Founders Corner': '🏗️' };
  newsletters.forEach(nl => {
    const icon = NL_ICONS[nl] || '📨';
    nlBtns.push(`<button class="filter-btn" onclick="setNewsletterFilter('${nl.replace(/'/g, "\'")}')">${icon} ${nl}</button>`);
  });
  nlRow.innerHTML = '<label>Newsletter:</label>' + nlBtns.join('');
})();

applyFilters();
</script>
<div id="news-tooltip"></div>
<script>
(function() {
  var tip = document.getElementById('news-tooltip');
  document.addEventListener('mouseover', function(e) {
    var btn = e.target.closest('.expand-btn');
    if (btn) {
      tip.textContent = btn.getAttribute('data-resumen') || '';
      tip.style.display = 'block';
    }
  });
  document.addEventListener('mouseout', function(e) {
    var btn = e.target.closest('.expand-btn');
    if (btn) {
      tip.style.display = 'none';
    }
  });
  document.addEventListener('mousemove', function(e) {
    if (tip.style.display === 'block') {
      var x = e.clientX + 14;
      var y = e.clientY - 10;
      if (x + 310 > window.innerWidth) x = e.clientX - 320;
      if (y + 120 > window.innerHeight) y = e.clientY - 130;
      tip.style.left = x + 'px';
      tip.style.top = y + 'px';
    }
  });
})();
</script>
