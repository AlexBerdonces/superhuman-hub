<meta charset="UTF-8">

<title>Newsletter Hub</title>
<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #22223a;
  --accent: #6c63ff;
  --violet: #8b5cf6;
  --green: #00c896;
  --orange: #ff9f40;
  --red: #ff4757;
  --blue: #4fc3f7;
  --purple: #ce93d8;
  --teal: #80cbc4;
  --accent2: #ff6584;
  --text: #e8e8f0;
  --text2: #9090a8;
  --border: #2a2a3a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
}

/* HEADER */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 12px;
}
.header-top {
  display: flex;
  align-items: baseline;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.header-title {
  font-size: 1.6rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--violet));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-sub {
  font-size: 0.85rem;
  color: var(--text2);
}
.cat-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}
.cat-chip {
  font-size: 0.72rem;
  padding: 2px 8px;
  border-radius: 20px;
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border);
}

/* CONTROLS */
.controls {
  position: sticky;
  top: 0;
  z-index: 99;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.search-box {
  width: 100%;
  padding: 8px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}
.search-box:focus {
  border-color: var(--accent);
}
.search-box::placeholder { color: var(--text2); }

.btn-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
.btn-row label {
  font-size: 0.78rem;
  color: var(--text2);
  margin-right: 2px;
}
.filter-btn {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  font-size: 0.8rem;
  transition: all 0.15s;
}
.filter-btn:hover {
  border-color: var(--accent);
  color: var(--text);
}
.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 600;
}
.filter-btn.active-sort {
  background: var(--violet);
  border-color: var(--violet);
  color: #fff;
  font-weight: 600;
}

/* GRID */
.grid-container {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

/* CARDS */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  display: flex;
  flex-direction: column;
}
.card:hover {
  transform: translateY(-2px);
  border-color: var(--blue);
  box-shadow: 0 4px 20px rgba(79,195,247,0.15);
}
.card-top-border {
  height: 3px;
  width: 100%;
}
.card-body {
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
}
.card-badges {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
}
.badge {
  font-size: 0.7rem;
  padding: 3px 8px;
  border-radius: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.badge-cat {
  background: rgba(108,99,255,0.15);
  color: var(--accent);
  border: 1px solid rgba(108,99,255,0.3);
}
.badge-score-green { background: rgba(0,200,150,0.15); color: var(--green); border: 1px solid rgba(0,200,150,0.3); }
.badge-score-orange { background: rgba(255,159,64,0.15); color: var(--orange); border: 1px solid rgba(255,159,64,0.3); }
.badge-score-red { background: rgba(255,71,87,0.15); color: var(--red); border: 1px solid rgba(255,71,87,0.3); }
.badge-prompt {
  background: rgba(139,92,246,0.15);
  color: var(--violet);
  border: 1px solid rgba(139,92,246,0.3);
}
.badge-tool {
  font-size: 0.7rem;
  padding: 3px 8px;
  border-radius: 12px;
  font-weight: 600;
  color: #fff;
}

.card-title {
  font-size: 0.95rem;
  font-weight: 600;
  line-height: 1.35;
  color: var(--text);
}
.card-summary {
  font-size: 0.82rem;
  color: var(--text2);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.tag {
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border);
}
.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: auto;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  font-size: 0.75rem;
  color: var(--text2);
}
.card-footer a {
  color: var(--accent);
  text-decoration: none;
  font-size: 0.75rem;
}
.card-footer a:hover { text-decoration: underline; }

/* ACCORDION */
.accordion-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--violet);
  cursor: pointer;
  font-size: 0.8rem;
  padding: 6px 12px;
  width: 100%;
  text-align: left;
  transition: background 0.15s;
}
.accordion-btn:hover { background: rgba(139,92,246,0.1); }
.accordion-content {
  display: none;
  margin-top: 8px;
}
.accordion-content.open { display: block; }
.prompt-code {
  background: #0d0d1a;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  font-size: 0.78rem;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.5;
  font-family: 'Fira Mono', 'Consolas', monospace;
  position: relative;
}
.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text2);
  cursor: pointer;
  font-size: 0.72rem;
  padding: 3px 8px;
  transition: all 0.15s;
}
.copy-btn:hover { color: var(--text); border-color: var(--accent); }
.copy-btn.copied { color: var(--green); border-color: var(--green); }

.desglose-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  font-size: 0.78rem;
}
.desglose-table th {
  text-align: left;
  padding: 6px 8px;
  background: var(--surface2);
  color: var(--text2);
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  width: 38%;
}
.desglose-table td {
  padding: 6px 8px;
  color: var(--text);
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.4;
}
.desglose-table tr:last-child th,
.desglose-table tr:last-child td { border-bottom: none; }

/* EMPTY STATE */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
  font-size: 1rem;
}

/* MOBILE */
@media (max-width: 480px) {
  .grid-container { padding: 12px; gap: 12px; }
  .controls { padding: 8px 12px; }
  .header-title { font-size: 1.3rem; }
}
</style>
</head>

function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatDate(d) {
  if (!d) return '';
  const parts = d.split('-');
  if (parts.length === 3) {
    return parts[2] + '/' + parts[1] + '/' + parts[0];
  }
  return d;
}

function getCatKey(item) {
  const c = item.categoria || '';
  return CAT_MAP[c] || 'IA';
}

function getScoreBadgeClass(score) {
  if (score > 70) return 'badge-score-green';
  if (score >= 40) return 'badge-score-orange';
  return 'badge-score-red';
}

function toggleAccordion(btn) {
  const content = btn.nextElementSibling;
  const isOpen = content.classList.contains('open');
  content.classList.toggle('open', !isOpen);
  btn.textContent = isOpen ? '▶ Ver desglose del prompt ▼' : '▼ Ocultar desglose ▲';
}

function copyPromptById(btn) {
  const id = btn.getAttribute('data-prompt-id');
  const item = RAW_DATA.noticias.find(x => x.id === id);
  const text = item ? (item.prompt_completo || '') : '';
  copyPrompt(btn, text);
}

function copyPrompt(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 Copiar';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 Copiar';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function buildCard(item) {
  const catKey = getCatKey(item);
  const borderColor = CAT_BORDER[catKey] || '#6c63ff';
  const scoreClass = getScoreBadgeClass(item.puntuacion || 0);
  const catLabel = CAT_LABEL[catKey] || catKey;
  const newsletter = item.newsletter || 'SuperHuman';
  const url = item.url || '';
  
  return `<div class="card">
    <div class="card-top-border" style="background:${borderColor}"></div>
    <div class="card-body">
      <div class="card-badges">
        <span class="badge badge-cat">${escapeHtml(catLabel)}</span>
        <span class="badge ${scoreClass}">⭐ ${item.puntuacion || 0}</span>
      </div>
      <div class="card-title">${escapeHtml(item.titulo)}</div>
      <div class="card-summary">${escapeHtml(item.resumen)}</div>
      <div class="card-footer">
        <span>📅 ${formatDate(item.fecha)}</span>
        <span>📨 ${escapeHtml(newsletter)}</span>
        ${url ? `<a href="${escapeHtml(url)}" target="_blank" rel="noopener">→ Ver artículo</a>` : ''}
      </div>
    </div>
  </div>`;
}

function buildPromptCard(item) {
  const tool = item.herramienta || 'Otro';
  const toolColor = TOOL_COLORS[tool] || '#6c63ff';
  const scoreClass = getScoreBadgeClass(item.puntuacion || 0);
  const tags = item.etiquetas || [];
  const promptText = item.prompt_completo || '';
  const d = item.desglose || {};
  const newsletter = item.newsletter || 'SuperHuman';
  
  const desgloseRows = [
    ['🎭 Rol', d.rol],
    ['🌍 Contexto', d.contexto],
    ['📋 Instrucción', d.instruccion],
    ['🧠 Cadena de pensamiento', d.cadena_pensamiento],
    ['📐 Formato', d.formato],
    ['🚫 Restricciones', d.restricciones],
  ].filter(r => r[1] && r[1] !== 'No especificado' && r[1] !== 'N/A').map(r =>
    `<tr><th>${escapeHtml(r[0])}</th><td>${escapeHtml(r[1])}</td></tr>`
  ).join('');

  const promptId = 'prompt_' + (item.id || Math.random().toString(36).slice(2));

  return `<div class="card">
    <div class="card-top-border" style="background:var(--violet)"></div>
    <div class="card-body">
      <div class="card-badges">
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          <span class="badge badge-prompt">💡 PROMPT</span>
          <span class="badge badge-tool" style="background:${toolColor}">${escapeHtml(tool)}</span>
        </div>
        <span class="badge ${scoreClass}">⭐ ${item.puntuacion || 0}</span>
      </div>
      <div class="card-title">${escapeHtml(item.titulo)}</div>
      ${tags.length ? `<div class="card-tags">${tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
      <div class="card-footer">
        <span>📅 ${formatDate(item.fecha)}</span>
        <span>📨 ${escapeHtml(newsletter)}</span>
      </div>
      <button class="accordion-btn" onclick="toggleAccordion(this)">▶ Ver desglose del prompt ▼</button>
      <div class="accordion-content">
        <div class="prompt-code" id="${promptId}-code">
          <button class="copy-btn" data-prompt-id="${escapeHtml(item.id)}" onclick="copyPromptById(this)">📋 Copiar</button>
          ${escapeHtml(promptText)}
        </div>
        ${desgloseRows ? `<table class="desglose-table"><tbody>${desgloseRows}</tbody></table>` : ''}
      </div>
    </div>
  </div>`;
}

function setTypeFilter(type) {
  activeType = type;
  document.querySelectorAll('#type-row .filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  
  const sortRow = document.getElementById('sort-row');
  const catRow = document.getElementById('cat-row');
  const scoreRow = document.getElementById('score-row');
  
  const sortHerramienta = document.getElementById('sort-herramienta-btn');
  if (type === 'prompt') {
    catRow.style.display = 'none';
    scoreRow.style.display = 'none';
    sortHerramienta.style.display = '';
    // Reset category filter so prompts are visible
    activeCat = 'all';
    document.querySelectorAll('#cat-row .filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('#cat-row .filter-btn').classList.add('active');
  } else {
    catRow.style.display = 'flex';
    scoreRow.style.display = 'flex';
    sortHerramienta.style.display = 'none';
  }
  applyFilters();
}

}

function applyFilters() {
  const query = document.getElementById('search-input').value.toLowerCase().trim();
  
  let items = noticias.filter(item => {
    // Type filter
    const itemType = item.tipo || 'noticia';
    if (activeType !== 'all' && itemType !== activeType) return false;
    
    // Category filter: if a category is active, exclude prompts (they have no category)
    if (activeCat !== 'all') {
      if (itemType !== 'noticia') return false;
      const catKey = getCatKey(item);
      if (catKey !== activeCat) return false;
    }
    
    // Newsletter filter
    if (activeNewsletter !== 'all') {
      const itemNewsletter = item.newsletter || 'SuperHuman';
      if (itemNewsletter !== activeNewsletter) return false;
    }

    // Score filter (only for noticias)
    if (activeScore !== 'all' && itemType === 'noticia') {
      const s = item.puntuacion || 0;
      if (activeScore === 'alto' && s <= 70) return false;
      if (activeScore === 'medio' && (s < 40 || s > 70)) return false;
      if (activeScore === 'bajo' && s >= 40) return false;
    }
    
    // Search filter
    if (query) {
      const searchable = [
        item.titulo || '',
        item.resumen || '',
        item.prompt_completo || '',
        (item.etiquetas || []).join(' '),
        item.categoria || '',
      ].join(' ').toLowerCase();
      if (!searchable.includes(query)) return false;
    }
    
    return true;
  });
  
  // Sort
  items.sort((a, b) => {
    if (activeSort === 'puntuacion') return (b.puntuacion || 0) - (a.puntuacion || 0);
    if (activeSort === 'fecha') return (b.fecha || '').localeCompare(a.fecha || '');
    if (activeSort === 'herramienta') return (a.herramienta || '').localeCompare(b.herramienta || '');
    return (b.puntuacion || 0) - (a.puntuacion || 0);
  });
  
  const grid = document.getElementById('grid');
  if (items.length === 0) {
    grid.innerHTML = '<div class="empty-state">😕 No se encontraron resultados para tu búsqueda</div>';
    return;
  }
  
  grid.innerHTML = items.map(item => {
    const tipo = item.tipo || 'noticia';
    return tipo === 'prompt' ? buildPromptCard(item) : buildCard(item);
  }).join('');
}
